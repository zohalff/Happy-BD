<!DOCTYPE html>
<html>
<head>
<title>Saturn Birthday</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    overflow:hidden;
    font-family:cursive;
    background:radial-gradient(circle at center,#1a1a2e,#0f0f1a 70%);
    color:white;
}

/* ستاره های چشمک زن */
.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{opacity:0.2;}
    to{opacity:1;}
}

/* متن بالا */
h1{
    position:absolute;
    top:40px;
    font-size:38px;
    text-align:center;
    color:#f7d046;
    text-shadow:0 0 15px #f7d046,0 0 30px #ffae00;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{text-shadow:0 0 10px #f7d046;}
    to{text-shadow:0 0 30px #ffae00;}
}

/* سیاره زحل */
.saturn{
    position:absolute;
    right:80px;
    width:120px;
    height:120px;
    background:radial-gradient(circle,#d4a373,#8d5524);
    border-radius:50%;
    box-shadow:0 0 40px #d4a373;
    animation:float 4s ease-in-out infinite;
}

.ring{
    position:absolute;
    top:45px;
    left:-30px;
    width:180px;
    height:40px;
    border:5px solid rgba(255,255,255,0.5);
    border-radius:50%;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
    100%{transform:translateY(0);}
}

/* کیک */
.cake{
    width:280px;
    height:140px;
    background:linear-gradient(#5e3b1f,#3e2412);
    border-radius:20px;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:bold;
    text-shadow:0 0 10px black;
    box-shadow:0 0 30px rgba(255,215,0,0.4);
}

.cream{
    width:280px;
    height:40px;
    background:white;
    position:absolute;
    top:-25px;
    border-radius:40px;
}

/* شمع */
.candle{
    width:10px;
    height:45px;
    background:white;
    position:absolute;
    top:-75px;
    cursor:pointer;
}

.flame{
    width:15px;
    height:15px;
    background:orange;
    border-radius:50%;
    position:absolute;
    top:-18px;
    left:-2px;
    animation:flicker 0.3s infinite alternate;
}

@keyframes flicker{
    from{transform:scale(1); opacity:1;}
    to{transform:scale(1.3); opacity:0.5;}
}

.confetti{
    position:absolute;
    width:8px;
    height:8px;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-100px);}
    100%{transform:translateY(100vh);}
}

#finalMessage{
    position:absolute;
    font-size:42px;
    opacity:0;
    transition:1s;
    text-align:center;
    color:#f7d046;
    text-shadow:0 0 20px gold;
}
</style>
</head>

<body>

<h1 id="title"></h1>

<div class="saturn">
    <div class="ring"></div>
</div>

<div class="cake" id="cakeText">
    <div class="cream"></div>

    <div class="candle" style="left:70px;" onclick="blow(this)">
        <div class="flame"></div>
    </div>

    <div class="candle" style="left:135px;" onclick="blow(this)">
        <div class="flame"></div>
    </div>

    <div class="candle" style="left:200px;" onclick="blow(this)">
        <div class="flame"></div>
    </div>
</div>

<div id="finalMessage"></div>

<audio autoplay loop>
<source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid">
</audio>

<script>

/* ستاره بساز */
for(let i=0;i<80;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";
    star.style.animationDuration=(Math.random()*3+1)+"s";
    document.body.appendChild(star);
}

let name=prompt("Enter the birthday person's name:");
document.getElementById("title").innerText="🎉 Happy Birthday "+name+" 🎉";
document.getElementById("cakeText").innerHTML+=name;

let candlesLeft=3;

function blow(candle){
    let flame=candle.querySelector(".flame");
    if(flame.style.display!=="none"){
        flame.style.display="none";
        candlesLeft--;
        launchConfetti();
        if(candlesLeft===0){
            surprise();
        }
    }
}

function launchConfetti(){
    for(let i=0;i<30;i++){
        let confetti=document.createElement("div");
        confetti.className="confetti";
        confetti.style.left=Math.random()*100+"vw";
        confetti.style.background=
        `hsl(${Math.random()*360},100%,50%)`;
        confetti.style.animationDuration=
        (Math.random()*3+2)+"s";
        document.body.appendChild(confetti);
        setTimeout(()=>{confetti.remove();},4000);
    }
}

function surprise(){
    document.body.style.background="black";
    document.getElementById("cakeText").style.display="none";
    document.getElementById("title").style.display="none";

    let msg=document.getElementById("finalMessage");
    msg.innerHTML="🪐 SATURN CELEBRATION 🪐<br>"+name+" You Are A Star!";
    msg.style.opacity="1";
    launchConfetti();
}

</script>

</body>
</html>
